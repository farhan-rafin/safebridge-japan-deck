<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SafeBridge Japan — Group 25</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0F1D3A;
  --navy-2:#152647;
  --green:#0A8A3C;
  --green-bright:#00A63C;
  --green-dark:#00682B;
  --amber:#B87400;
  --amber-bright:#FFB81C;
  --red:#C0392B;
  --red-bright:#E63946;
  --paper:#F7F5F0;
  --bg:#FDFCFA;
  --ink:#0F1D3A;
  --white:#FFFFFF;
  --mist:rgba(15,29,58,0.60);
  --line:rgba(15,29,58,0.12);
  --font-display:'Archivo Expanded', sans-serif;
  --font-body:'IBM Plex Sans', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  overflow:hidden;
  height:100%;
  width:100%;
}
body{
  background-image:
    radial-gradient(circle at 15% 20%, rgba(10,138,60,0.07), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(184,116,0,0.05), transparent 45%),
    repeating-linear-gradient(90deg, rgba(15,29,58,0.035) 0px, rgba(15,29,58,0.035) 1px, transparent 1px, transparent 64px),
    repeating-linear-gradient(0deg, rgba(15,29,58,0.035) 0px, rgba(15,29,58,0.035) 1px, transparent 1px, transparent 64px);
}

/* ===== chrome ===== */
#topbar{
  position:fixed; top:0; left:0; right:0; height:56px; z-index:50;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 28px; background:linear-gradient(180deg, rgba(253,252,250,0.94), rgba(253,252,250,0));
  pointer-events:none;
}
#brandmark{
  display:flex; align-items:center; gap:10px; font-family:var(--font-mono); font-size:12px; letter-spacing:0.12em; color:var(--mist);
}
#brandmark .dot{width:7px;height:7px;border-radius:50%;background:var(--green); box-shadow:0 0 8px var(--green);}
#counter{font-family:var(--font-mono); font-size:12px; letter-spacing:0.1em; color:var(--mist);}
#routewrap{position:fixed; top:0; left:0; right:0; height:3px; z-index:60; background:rgba(15,29,58,0.08);}
#routefill{height:100%; width:0%; background:linear-gradient(90deg, var(--green-bright), var(--amber-bright)); transition:width .5s cubic-bezier(.65,0,.35,1); box-shadow:0 0 12px rgba(0,166,60,.6);}

#bgDecor{position:fixed; inset:0; z-index:1; pointer-events:none;}

#nav{
  position:fixed; bottom:22px; right:28px; z-index:50;
  display:flex; align-items:center; gap:14px;
}
.navbtn{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--line);
  background:rgba(15,29,58,0.05); color:var(--ink); cursor:pointer;
  display:flex;align-items:center;justify-content:center; font-size:16px;
  transition:all .2s ease;
}
.navbtn:hover{background:var(--green); border-color:var(--green); color:var(--navy);}
#dots{display:flex; gap:5px; align-items:center; margin:0 6px;}
.dotnav{width:5px;height:5px;border-radius:50%;background:rgba(15,29,58,0.25); transition:all .25s ease;}
.dotnav.active{background:var(--green); width:16px; border-radius:3px;}

#speakerTag{
  position:fixed; bottom:22px; left:28px; z-index:50;
  font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; color:var(--mist);
  display:flex; align-items:center; gap:8px;
  padding:7px 12px; border:1px solid var(--line); border-radius:20px; background:rgba(15,29,58,0.04);
}
#speakerTag .who{color:var(--amber); font-weight:600;}

/* ===== slides ===== */
#deck{position:relative; width:100%; height:100%;}
.slide{
  position:absolute; inset:0; padding:clamp(70px,10vh,110px) clamp(32px,6vw,90px) clamp(50px,8vh,90px);
  display:flex; flex-direction:column; justify-content:center;
  opacity:0; visibility:hidden; transform:translateY(24px);
  transition:opacity .55s ease, transform .55s cubic-bezier(.2,.8,.2,1), visibility 0s linear .55s;
  overflow-y:auto; overflow-x:hidden; z-index:2;
}
.slide.active{
  opacity:1; visibility:visible; transform:translateY(0);
  transition:opacity .55s ease, transform .55s cubic-bezier(.2,.8,.2,1), visibility 0s;
}
.slide .reveal{opacity:0; transform:translateY(14px); transition:opacity .5s ease, transform .5s ease;}
.slide.active .reveal{opacity:1; transform:translateY(0);}
.slide.active .reveal:nth-child(1){transition-delay:.08s;}
.slide.active .reveal:nth-child(2){transition-delay:.16s;}
.slide.active .reveal:nth-child(3){transition-delay:.24s;}
.slide.active .reveal:nth-child(4){transition-delay:.32s;}
.slide.active .reveal:nth-child(5){transition-delay:.4s;}

.eyebrow{
  font-family:var(--font-mono); font-size:12px; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--green); display:flex; align-items:center; gap:8px; margin-bottom:14px;
}
.eyebrow::before{content:''; width:22px; height:2px; background:var(--green);}
h1.title{
  font-family:var(--font-display); font-weight:700; font-size:clamp(28px,3.4vw,42px); line-height:1.1;
  letter-spacing:-0.01em; margin-bottom:18px; max-width:900px;
}
p.lead{font-size:clamp(14px,1.3vw,17px); line-height:1.55; color:var(--mist); max-width:680px; margin-bottom:22px;}

/* icon */
.icn{width:22px;height:22px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0;}

/* bullet list */
ul.blist{list-style:none; display:flex; flex-direction:column; gap:16px; max-width:760px;}
ul.blist li{display:flex; gap:14px; align-items:flex-start;}
ul.blist .ico-box{width:36px;height:36px;border-radius:9px;background:rgba(0,166,60,0.14); border:1px solid rgba(0,166,60,0.35); display:flex; align-items:center; justify-content:center; color:var(--green); flex-shrink:0;}
ul.blist .txt b{display:block; font-size:15.5px; font-weight:600; margin-bottom:2px;}
ul.blist .txt span{font-size:14px; color:var(--mist); line-height:1.5;}

/* cover */
.cover-wrap{display:flex; flex-direction:column; align-items:flex-start; justify-content:center; height:100%; position:relative;}
.cover-badge{font-family:var(--font-mono); font-size:12px; letter-spacing:0.2em; color:var(--amber); border:1px solid rgba(255,184,28,0.4); padding:6px 14px; border-radius:20px; margin-bottom:26px;}
.cover-title{font-family:var(--font-display); font-weight:800; font-size:clamp(44px,7.5vw,88px); line-height:0.95; letter-spacing:-0.02em; margin-bottom:18px;}
.cover-title span{color:var(--green);}
.cover-tag{font-size:20px; color:var(--mist); font-style:italic; margin-bottom:40px;}
.cover-meta{display:flex; gap:36px; font-family:var(--font-mono); font-size:12.5px; color:var(--mist); letter-spacing:0.05em;}
.cover-meta div b{display:block; color:var(--ink); font-size:13.5px; margin-bottom:3px; font-family:var(--font-body); font-weight:600;}
.cover-pins{position:absolute; right:0; top:50%; transform:translateY(-50%); opacity:.9;}

/* team */
.team-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:13px; max-width:1100px;}
.team-card{background:rgba(15,29,58,0.04); border:1px solid var(--line); border-radius:14px; padding:15px; transition:border-color .2s, transform .2s;}
.team-card:hover{border-color:var(--green); transform:translateY(-3px);}
.team-avatar{width:38px;height:38px;border-radius:50%; background:var(--green-bright); display:flex;align-items:center;justify-content:center; font-family:var(--font-display); font-weight:700; color:var(--navy); font-size:14px; margin-bottom:10px; overflow:hidden;}
.team-avatar img{width:100%;height:100%;object-fit:cover; display:block;}
.team-name{font-weight:600; font-size:13.5px; margin-bottom:2px;}
.team-role{font-size:10.5px; color:var(--amber); font-family:var(--font-mono); letter-spacing:0.04em; margin-bottom:6px; text-transform:uppercase;}
.team-desc{font-size:11.5px; color:var(--mist); line-height:1.42;}

/* twocol */
.twocol{display:grid; grid-template-columns:1fr 1fr; gap:36px; max-width:1050px;}
.col-card{background:rgba(15,29,58,0.03); border:1px solid var(--line); border-radius:16px; padding:26px;}
.col-card.warn{border-color:rgba(230,57,70,0.35); background:rgba(230,57,70,0.06);}
.col-card.good{border-color:rgba(0,166,60,0.35); background:rgba(0,166,60,0.06);}
.col-head{display:flex; align-items:center; gap:10px; margin-bottom:16px; font-family:var(--font-display); font-weight:700; font-size:17px;}
.col-card.warn .col-head{color:var(--red);}
.col-card.good .col-head{color:var(--green);}
.col-card ul{list-style:none; display:flex; flex-direction:column; gap:11px;}
.col-card ul li{font-size:14px; color:var(--mist); padding-left:16px; position:relative; line-height:1.5;}
.col-card ul li::before{content:''; position:absolute; left:0; top:7px; width:6px;height:6px;border-radius:50%;background:currentColor; opacity:.6;}

/* feature grid */
.fgrid{display:grid; grid-template-columns:repeat(var(--cols,3), 1fr); gap:16px; max-width:1100px;}
.fcard{background:rgba(15,29,58,0.04); border:1px solid var(--line); border-radius:16px; padding:22px; transition:transform .2s, border-color .2s;}
.fcard:hover{transform:translateY(-4px); border-color:var(--green);}
.fcard .ico-box{width:44px;height:44px;border-radius:11px; background:rgba(0,166,60,0.15); border:1px solid rgba(0,166,60,0.35); display:flex;align-items:center;justify-content:center; color:var(--green); margin-bottom:16px;}
.fcard h3{font-family:var(--font-display); font-size:16px; font-weight:700; margin-bottom:8px;}
.fcard p{font-size:13.5px; color:var(--mist); line-height:1.55;}
.fcard .tag{display:inline-block; margin-top:12px; font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.06em; color:var(--amber); border:1px solid rgba(255,184,28,0.35); padding:3px 9px; border-radius:12px;}

/* persona */
.persona-wrap{display:flex; gap:44px; align-items:center; max-width:1100px;}
.persona-card{width:280px; flex-shrink:0; background:rgba(15,29,58,0.05); border:1px solid var(--line); border-radius:20px; padding:28px; text-align:center;}
.persona-avatar{width:84px;height:84px;border-radius:50%; margin:0 auto 16px; background:linear-gradient(135deg,var(--green),var(--green-dark)); display:flex;align-items:center;justify-content:center; font-family:var(--font-display); font-size:30px; font-weight:800; color:var(--navy);}
.persona-name{font-family:var(--font-display); font-size:22px; font-weight:700;}
.persona-sub{font-size:12.5px; color:var(--amber); font-family:var(--font-mono); margin:4px 0 18px;}
.persona-stats{display:flex; flex-direction:column; gap:9px; text-align:left; font-size:12.5px; color:var(--mist); border-top:1px solid var(--line); padding-top:16px;}
.persona-stats b{color:var(--ink); font-weight:600;}
.persona-chips{flex:1;}
.persona-chips h4{font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--red); margin-bottom:14px;}
.chip-row{display:flex; flex-wrap:wrap; gap:9px;}
.chip{font-size:13px; padding:9px 14px; border-radius:20px; background:rgba(230,57,70,0.08); border:1px solid rgba(230,57,70,0.3); color:var(--mist);}

/* journey */
.journey{position:relative; max-width:1100px; padding-top:20px;}
.journey-line{position:relative; height:2px; background:var(--line); margin:0 20px 40px; border-radius:2px; overflow:visible;}
.journey-line .fill{position:absolute; top:0; left:0; height:100%; width:0%; background:linear-gradient(90deg,var(--green-bright),var(--amber-bright)); border-radius:2px;}
.journey-steps{display:grid; grid-template-columns:repeat(5,1fr); gap:14px;}
.jstep{text-align:left; position:relative;}
.jstep .num{width:34px;height:34px;border-radius:50%; background:var(--bg); border:2px solid var(--green); color:var(--green); display:flex;align-items:center;justify-content:center; font-family:var(--font-mono); font-weight:600; font-size:13px; margin-bottom:12px;}
.jstep h4{font-size:13.5px; font-weight:600; margin-bottom:6px;}
.jstep p{font-size:12px; color:var(--mist); line-height:1.5;}

/* stakeholder list */
.sh-groups{display:flex; gap:40px; max-width:1100px;}
.sh-col{flex:1;}
.sh-col h3{font-family:var(--font-display); font-size:16px; margin-bottom:16px; display:flex; align-items:center; gap:8px;}
.sh-col.primary h3{color:var(--green);}
.sh-col.secondary h3{color:var(--amber);}
.sh-chip{display:flex; align-items:center; gap:12px; padding:13px 16px; background:rgba(15,29,58,0.04); border:1px solid var(--line); border-radius:12px; margin-bottom:10px; font-size:13.5px;}
.sh-chip .ico-box{width:30px;height:30px;border-radius:8px; display:flex;align-items:center;justify-content:center; flex-shrink:0;}
.sh-col.primary .ico-box{background:rgba(0,166,60,.15); color:var(--green);}
.sh-col.secondary .ico-box{background:rgba(255,184,28,.15); color:var(--amber);}

/* table */
table.dtable{width:100%; max-width:1130px; border-collapse:collapse; font-size:13px;}
table.dtable th{font-family:var(--font-mono); text-transform:uppercase; letter-spacing:0.06em; font-size:10.5px; color:var(--green); text-align:left; padding:10px 14px; border-bottom:2px solid rgba(0,166,60,.4);}
table.dtable td{padding:12px 14px; border-bottom:1px solid var(--line); color:var(--mist); vertical-align:top; line-height:1.45;}
table.dtable tr td:first-child{color:var(--ink); font-weight:600;}
.pill{display:inline-block; font-size:10.5px; font-family:var(--font-mono); padding:3px 9px; border-radius:10px; letter-spacing:.04em;}
.pill.high{background:rgba(230,57,70,.18); color:#ff8a93; border:1px solid rgba(230,57,70,.4);}
.pill.med{background:rgba(255,184,28,.18); color:var(--amber); border:1px solid rgba(255,184,28,.4);}
.pill.low{background:rgba(0,166,60,.18); color:#5fe08a; border:1px solid rgba(0,166,60,.4);}

/* phases */
.phase-row{display:grid; grid-template-columns:1fr 1fr; gap:22px; max-width:1100px;}
.phase-card{background:rgba(15,29,58,0.04); border:1px solid var(--line); border-radius:16px; padding:24px; position:relative; overflow:hidden;}
.phase-card::before{content:attr(data-n); position:absolute; top:-14px; right:8px; font-family:var(--font-display); font-size:78px; font-weight:800; color:rgba(15,29,58,0.04);}
.phase-card h3{font-family:var(--font-display); font-size:17px; margin-bottom:6px; color:var(--green);}
.phase-card .sub{font-family:var(--font-mono); font-size:11px; color:var(--amber); margin-bottom:14px; letter-spacing:.05em;}
.phase-card ul{list-style:none; display:flex; flex-direction:column; gap:8px;}
.phase-card ul li{font-size:13px; color:var(--mist); padding-left:14px; position:relative;}
.phase-card ul li::before{content:'→'; position:absolute; left:0; color:var(--green);}

/* budget */
.budget-wrap{display:flex; gap:50px; max-width:1130px; align-items:center;}
.budget-total{flex-shrink:0; text-align:left;}
.budget-total .num{font-family:var(--font-display); font-size:52px; font-weight:800; color:var(--amber);}
.budget-total .lbl{font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; color:var(--mist); text-transform:uppercase; margin-top:6px;}
.bars{flex:1; display:flex; flex-direction:column; gap:14px;}
.bar-row{display:flex; align-items:center; gap:14px;}
.bar-row .blabel{width:210px; font-size:13px; flex-shrink:0;}
.bar-track{flex:1; height:10px; border-radius:6px; background:rgba(15,29,58,0.06); overflow:hidden;}
.bar-fill{height:100%; width:0%; border-radius:6px; background:linear-gradient(90deg,var(--green-bright),var(--amber-bright)); transition:width 1.1s cubic-bezier(.2,.8,.2,1);}
.bar-row .bval{width:80px; text-align:right; font-family:var(--font-mono); font-size:12px; color:var(--mist); flex-shrink:0;}

/* budget detail list */
.bd-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; max-width:1100px;}
.bd-item{display:flex; justify-content:space-between; align-items:center; padding:15px 18px; background:rgba(15,29,58,0.04); border:1px solid var(--line); border-radius:12px;}
.bd-item .n{font-size:13.5px; font-weight:600;}
.bd-item .d{font-size:11.5px; color:var(--mist); margin-top:3px;}
.bd-item .v{font-family:var(--font-mono); font-size:14px; color:var(--amber); flex-shrink:0;}

/* success list */
.slist{display:flex; flex-direction:column; gap:14px; max-width:760px;}
.sitem{display:flex; gap:14px; align-items:flex-start; padding:14px 16px; background:rgba(0,166,60,0.05); border:1px solid rgba(0,166,60,0.2); border-radius:12px;}
.sitem .check{width:26px;height:26px;border-radius:50%; background:var(--green); color:var(--navy); display:flex;align-items:center;justify-content:center; flex-shrink:0; font-weight:700; font-size:13px;}
.sitem b{display:block; font-size:14.5px; margin-bottom:2px;}
.sitem span{font-size:13px; color:var(--mist);}
.sitem .metric{font-family:var(--font-mono); font-size:11.5px; color:var(--amber); margin-left:auto; white-space:nowrap; padding-left:12px;}

/* pm vs project */
.pvp-wrap{display:flex; gap:0; max-width:1130px; border:1px solid var(--line); border-radius:18px; overflow:hidden;}
.pvp-col{flex:1; padding:30px;}
.pvp-col.left{background:rgba(255,184,28,0.06); border-right:1px solid var(--line);}
.pvp-col.right{background:rgba(0,166,60,0.06);}
.pvp-col h3{font-family:var(--font-display); font-size:19px; margin-bottom:4px;}
.pvp-col.left h3{color:var(--amber);}
.pvp-col.right h3{color:var(--green);}
.pvp-col .sub2{font-size:12px; color:var(--mist); font-style:italic; margin-bottom:18px;}
.pvp-col ul{list-style:none; display:flex; flex-direction:column; gap:11px;}
.pvp-col ul li{font-size:13.5px; color:var(--mist); padding-left:16px; position:relative;}
.pvp-col ul li::before{content:'—'; position:absolute; left:0; opacity:.6;}

/* conclusion */
.conc-wrap{max-width:920px;}
.conc-quote{font-family:var(--font-display); font-size:38px; line-height:1.28; font-weight:700; margin-bottom:26px;}
.conc-quote .hl{color:var(--green);}
.conc-sub{font-size:16px; color:var(--mist); line-height:1.6; max-width:680px;}
.conc-tagline{margin-top:34px; font-family:var(--font-mono); font-size:13px; color:var(--amber); letter-spacing:.04em;}

@media (max-width:900px){
  .slide{padding:90px 24px 70px;}
  .cover-title{font-size:44px;}
  .team-grid{grid-template-columns:repeat(2,1fr);}
  .fgrid{grid-template-columns:repeat(2,1fr) !important;}
  .twocol,.phase-row,.budget-wrap,.pvp-wrap,.sh-groups,.bd-grid{grid-template-columns:1fr; flex-direction:column;}
  .journey-steps{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<symbol id="i-globe" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a13 13 0 0 1 0 18 13 13 0 0 1 0-18z"/></symbol>
<symbol id="i-shield" viewBox="0 0 24 24"><path d="M12 2l8 3v6c0 5-3.4 8.7-8 11-4.6-2.3-8-6-8-11V5l8-3z"/></symbol>
<symbol id="i-users" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.5 3-6 6.5-6s6.5 2.5 6.5 6"/><circle cx="17.5" cy="9" r="2.6"/><path d="M15.8 14.2c2.7.4 5 2.5 5 5.8"/></symbol>

// ===================== BUILD DOM =====================
const deckEl = document.getElementById('deck');
SLIDES.forEach((s,i)=>{
  const el = document.createElement('div');
  el.className = 'slide';
  el.dataset.index = i;
  el.dataset.speaker = s.speaker;
  el.dataset.time = s.time;
  el.innerHTML = RENDERERS[s.kind](s.data);
  deckEl.appendChild(el);
});
const dotsEl = document.getElementById('dots');
SLIDES.forEach((s,i)=>{
  const dot = document.createElement('div');
  dot.className='dotnav';
  dot.addEventListener('click',()=>goTo(i));
  dotsEl.appendChild(dot);
});

let current = 0;
const slideEls = document.querySelectorAll('.slide');
const dotEls = document.querySelectorAll('.dotnav');

function goTo(i){
  if(i<0 || i>=SLIDES.length) return;
  slideEls[current].classList.remove('active');
  current = i;
  const s = SLIDES[current];
  slideEls[current].classList.add('active');
  dotEls.forEach((d,idx)=>d.classList.toggle('active', idx===current));
  document.getElementById('counter').textContent = String(current+1).padStart(2,'0')+' / '+SLIDES.length;
  document.getElementById('speakerName').textContent = s.speaker;
  document.getElementById('speakerTime').textContent = s.time;
  document.getElementById('routefill').style.width = (100*(current+1)/SLIDES.length)+'%';

  // animate bar charts / journey fill on enter
  setTimeout(()=>{
    slideEls[current].querySelectorAll('.bar-fill').forEach(b=>{ b.style.width = b.dataset.pct+'%'; });
    const jf = slideEls[current].querySelector('#jfill');
    if(jf){ jf.style.transition='width 1.4s cubic-bezier(.2,.8,.2,1)'; jf.style.width='100%'; }
  }, 150);
}
goTo(0);

document.getElementById('nextBtn').addEventListener('click',()=>goTo(current+1));
document.getElementById('prevBtn').addEventListener('click',()=>goTo(current-1));

function handleKey(e){
  if(['ArrowRight','ArrowDown',' ','PageDown'].includes(e.key)){ e.preventDefault(); goTo(current+1); }
  if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){ e.preventDefault(); goTo(current-1); }
}
// single listener on document only — window+document both would double-fire
// every keypress since the event bubbles from document up to window
document.addEventListener('keydown', handleKey);
document.body.setAttribute('tabindex','-1');
window.addEventListener('load', ()=> document.body.focus());
document.body.addEventListener('click', ()=> document.body.focus());

let touchX=null;
window.addEventListener('touchstart',e=>touchX=e.touches[0].clientX);
window.addEventListener('touchend',e=>{
  if(touchX===null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if(dx<-40) goTo(current+1);
  if(dx>40) goTo(current-1);
  touchX=null;
});
</script>
