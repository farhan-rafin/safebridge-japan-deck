<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>alertlingo — Group 25</title>
<meta name="description" content="alertlingo — a multilingual disaster-alert app for foreign residents and tourists in Japan. Strategic Project Management, Group 25.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230F1D3A'/%3E%3Cpath d='M50 15 88 82H12z' fill='none' stroke='%23E63946' stroke-width='6' stroke-linejoin='round'/%3E%3Cpath d='M50 40v18M50 66h.01' stroke='%23E63946' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0F1D3A;
  --navy-2:#152647;
  --orange:#E8720C;
  --orange-bright:#FF7A1A;
  --orange-dark:#B85400;
  --gold:#B98A00;
  --gold-bright:#FFC93C;
  --red:#C0392B;
  --red-bright:#E63946;
  --paper:#F7F5F0;
  --bg:#FDFCFA;
  --ink:#0F1D3A;
  --white:#FFFFFF;
  --mist:rgba(15,29,58,0.60);
  --line:rgba(15,29,58,0.12);
  --font-display:'Archivo Expanded', sans-serif;
  --font-body:'IBM Plex Sans', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
  /* legacy aliases so every existing component reads the new brand automatically */
  --green:var(--orange); --green-bright:var(--orange-bright); --green-dark:var(--orange-dark);
  --amber:var(--gold); --amber-bright:var(--gold-bright);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  overflow:hidden;
  height:100%;
  width:100%;
}
body{
  background-image:
    radial-gradient(circle at 15% 20%, rgba(232,114,12,0.07), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(15,29,58,0.05), transparent 45%),
    repeating-linear-gradient(90deg, rgba(15,29,58,0.035) 0px, rgba(15,29,58,0.035) 1px, transparent 1px, transparent 64px),
    repeating-linear-gradient(0deg, rgba(15,29,58,0.035) 0px, rgba(15,29,58,0.035) 1px, transparent 1px, transparent 64px);
}

/* ===== chrome ===== */
#topbar{
  position:fixed; top:0; left:0; right:0; height:56px; z-index:50;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 28px; background:linear-gradient(180deg, rgba(253,252,250,0.94), rgba(253,252,250,0));
  pointer-events:none;
}
#brandmark{
  display:flex; align-items:center; gap:9px; font-family:var(--font-display); font-weight:800; font-size:15px; letter-spacing:-0.01em;
}
#brandmark .bmark{width:20px;height:20px;flex-shrink:0;}
#brandmark .lingo{color:var(--orange);}
#brandmark .grp{font-family:var(--font-mono); font-weight:400; font-size:11px; letter-spacing:0.1em; color:var(--mist); margin-left:6px;}
#counter{font-family:var(--font-mono); font-size:12px; letter-spacing:0.1em; color:var(--mist);}
#routewrap{position:fixed; top:0; left:0; right:0; height:3px; z-index:60; background:rgba(15,29,58,0.08);}
#routefill{height:100%; width:0%; background:linear-gradient(90deg, var(--orange-bright), var(--gold-bright)); transition:width .5s cubic-bezier(.65,0,.35,1); box-shadow:0 0 12px rgba(232,114,12,.6);}

#bgDecor{position:fixed; inset:0; z-index:1; pointer-events:none;}

#nav{
  position:fixed; bottom:22px; right:28px; z-index:50;
  display:flex; align-items:center; gap:14px;
}
.navbtn{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--line);
  background:rgba(15,29,58,0.05); color:var(--ink); cursor:pointer;
  display:flex;align-items:center;justify-content:center; font-size:16px;
  transition:all .2s ease;
}
.navbtn:hover{background:var(--orange); border-color:var(--orange); color:var(--white);}
#dots{display:flex; gap:5px; align-items:center; margin:0 6px; max-width:260px; overflow:hidden;}
.dotnav{width:5px;height:5px;border-radius:50%;background:rgba(15,29,58,0.25); transition:all .25s ease; flex-shrink:0;}
.dotnav.active{background:var(--orange); width:16px; border-radius:3px;}

#appLinkPill{pointer-events:auto; font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; color:var(--orange-dark); border:1px solid rgba(232,114,12,0.4); background:rgba(232,114,12,0.08); padding:6px 12px; border-radius:20px; text-decoration:none; margin-right:14px;}

#speakerTag{
  position:fixed; bottom:22px; left:28px; z-index:50;
  font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; color:var(--mist);
  display:flex; align-items:center; gap:8px;
  padding:7px 12px; border:1px solid var(--line); border-radius:20px; background:rgba(15,29,58,0.04);
}
#speakerTag .who{color:var(--orange-dark); font-weight:600;}

/* ===== slides ===== */
#deck{position:relative; width:100%; height:100%;}
.slide{
  position:absolute; inset:0; padding:clamp(70px,10vh,110px) clamp(32px,6vw,90px) clamp(50px,8vh,90px);
  display:flex; flex-direction:column; justify-content:center;
  opacity:0; visibility:hidden; transform:translateY(24px);
  transition:opacity .55s ease, transform .55s cubic-bezier(.2,.8,.2,1), visibility 0s linear .55s;
  overflow-y:auto; overflow-x:hidden; z-index:2;
}
.slide.active{
  opacity:1; visibility:visible; transform:translateY(0);
  transition:opacity .55s ease, transform .55s cubic-bezier(.2,.8,.2,1), visibility 0s;
}
.slide .reveal{opacity:0; transform:translateY(14px); transition:opacity .5s ease, transform .5s ease;}
.slide.active .reveal{opacity:1; transform:translateY(0);}
.slide.active .reveal:nth-child(1){transition-delay:.08s;}
.slide.active .reveal:nth-child(2){transition-delay:.16s;}
.slide.active .reveal:nth-child(3){transition-delay:.24s;}
.slide.active .reveal:nth-child(4){transition-delay:.32s;}
.slide.active .reveal:nth-child(5){transition-delay:.4s;}

.eyebrow{
  font-family:var(--font-mono); font-size:12px; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--orange-dark); display:flex; align-items:center; gap:8px; margin-bottom:14px;
}
.eyebrow::before{content:''; width:22px; height:2px; background:var(--orange-dark);}
h1.title{
  font-family:var(--font-display); font-weight:700; font-size:clamp(26px,3.1vw,40px); line-height:1.12;
  letter-spacing:-0.01em; margin-bottom:16px; max-width:920px;
}
p.lead{font-size:clamp(14px,1.3vw,17px); line-height:1.55; color:var(--mist); max-width:700px; margin-bottom:20px;}

/* icon */
.icn{width:22px;height:22px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0;}

/* bullet list */
ul.blist{list-style:none; display:flex; flex-direction:column; gap:14px; max-width:760px;}
ul.blist li{display:flex; gap:14px; align-items:flex-start;}
ul.blist .ico-box{width:34px;height:34px;border-radius:9px;background:rgba(232,114,12,0.14); border:1px solid rgba(232,114,12,0.35); display:flex; align-items:center; justify-content:center; color:var(--orange-dark); flex-shrink:0;}
ul.blist .txt b{display:block; font-size:15px; font-weight:600; margin-bottom:2px;}
ul.blist .txt span{font-size:13.5px; color:var(--mist); line-height:1.5;}

/* ===== brand logo mark ===== */
.logomark{display:inline-flex; align-items:center; justify-content:center;}
.logo-orbit{position:relative; width:132px; height:132px; flex-shrink:0;}
.logo-orbit .core{position:absolute; top:18px; left:18px; width:96px; height:96px; color:var(--red-bright); stroke-width:1.4;}
.logo-orbit .sat{position:absolute; width:34px;height:34px;border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; box-shadow:0 6px 14px -4px rgba(15,29,58,0.4);}
.logo-orbit .sat svg{width:17px;height:17px;}
.logo-orbit .sat.s1{top:-4px; left:6px; background:#2a78d6;}
.logo-orbit .sat.s2{top:-4px; right:6px; background:var(--orange-bright);}
.logo-orbit .sat.s3{bottom:2px; left:-8px; background:#1baf7a;}
.logo-orbit .sat.s4{bottom:2px; right:-8px; background:var(--gold-bright); color:var(--navy);}
.wordmark{font-family:var(--font-display); font-weight:800; letter-spacing:-0.01em;}
.wordmark .a{color:var(--navy);} .wordmark .l{color:var(--orange);}

/* cover */
.cover-wrap{display:flex; flex-direction:column; align-items:flex-start; justify-content:center; height:100%; position:relative; perspective:1400px;}
.c3d-ground{
  position:absolute; left:-12%; bottom:0; width:124%; height:86%; z-index:-1;
  transform-origin:50% 100%; transform:rotateX(57deg) translateZ(-50px);
  pointer-events:none; overflow:hidden;
  background-image:linear-gradient(rgba(15,29,58,0.055) 1px, transparent 1px), linear-gradient(90deg, rgba(15,29,58,0.055) 1px, transparent 1px);
  background-size:64px 64px;
  -webkit-mask-image:radial-gradient(ellipse 62% 80% at 54% 92%, #000 32%, transparent 76%);
  mask-image:radial-gradient(ellipse 62% 80% at 54% 92%, #000 32%, transparent 76%);
}
.c3d-ground .ring{position:absolute; left:54%; top:66%; border-radius:50%; border:1.5px solid rgba(232,114,12,0.30); transform:translate(-50%,-50%);}
.c3d-ground .ring.r1{width:230px; height:230px;}
.c3d-ground .ring.r2{width:480px; height:480px; border-color:rgba(232,114,12,0.20);}
.c3d-ground .ring.r3{width:760px; height:760px; border-color:rgba(232,114,12,0.12);}
.c3d-ground .sweep{
  position:absolute; left:54%; top:66%; width:760px; height:760px; border-radius:50%;
  transform:translate(-50%,-50%) rotate(0deg);
  background:conic-gradient(from 0deg, rgba(232,114,12,0.14), transparent 26%);
  animation:c3dSweep 10s linear infinite;
}
@keyframes c3dSweep{to{transform:translate(-50%,-50%) rotate(360deg);}}
@media (prefers-reduced-motion:reduce){ .c3d-ground .sweep{animation:none;} }
.cover-top{display:flex; align-items:center; gap:18px; margin-bottom:22px;}
.cover-badge{font-family:var(--font-mono); font-size:12px; letter-spacing:0.2em; color:var(--orange-dark); border:1px solid rgba(232,114,12,0.4); padding:6px 14px; border-radius:20px; transition:transform .12s ease-out; will-change:transform;}
.cover-title{font-family:var(--font-display); font-weight:800; font-size:clamp(48px,8vw,96px); line-height:0.95; letter-spacing:-0.02em; margin-bottom:18px; transition:transform .12s ease-out; transform-style:preserve-3d; will-change:transform;}
.cover-title .a{color:var(--navy);} .cover-title .l{color:var(--orange);}
.cover-tag{font-size:19px; color:var(--mist); font-style:italic; margin-bottom:36px; max-width:640px; transition:transform .12s ease-out; will-change:transform;}
.cover-meta{display:flex; gap:36px; font-family:var(--font-mono); font-size:12.5px; color:var(--mist); letter-spacing:0.05em; transition:transform .12s ease-out; will-change:transform;}
.cover-meta div b{display:block; color:var(--ink); font-size:13.5px; margin-bottom:3px; font-family:var(--font-body); font-weight:600;}

/* team */
.team-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:13px; max-width:1100px;}
.team-card{background:rgba(15,29,58,0.04); border:1px solid var(--line); border-radius:14px; padding:15px; transition:border-color .2s, transform .25s ease; transform-style:preserve-3d;}
.team-card:hover{border-color:var(--orange); transform:perspective(700px) rotateX(5deg) translateY(-4px);}
.team-avatar{width:38px;height:38px;border-radius:50%; background:var(--orange-bright); display:flex;align-items:center;justify-content:center; font-family:var(--font-display); font-weight:700; color:var(--navy); font-size:14px; margin-bottom:10px; overflow:hidden;}
.team-avatar img{width:100%;height:100%;object-fit:cover; display:block;}
.team-name{font-weight:600; font-size:13.5px; margin-bottom:2px;}
.team-role{font-size:10.5px; color:var(--orange-dark); font-family:var(--font-mono); letter-spacing:0.04em; margin-bottom:6px; text-transform:uppercase;}
.team-desc{font-size:11.5px; color:var(--mist); line-height:1.42;}

/* twocol */
.twocol{display:grid; grid-template-columns:1fr 1fr; gap:36px; max-width:1050px;}
.col-card{background:rgba(15,29,58,0.03); border:1px solid var(--line); border-radius:16px; padding:26px;}
.col-card.warn{border-color:rgba(230,57,70,0.35); background:rgba(230,57,70,0.06);}
.col-card.good{border-color:rgba(232,114,12,0.35); background:rgba(232,114,12,0.06);}
.col-head{display:flex; align-items:center; gap:10px; margin-bottom:16px; font-family:var(--font-display); font-weight:700; font-size:17px;}
.col-card.warn .col-head{color:var(--red);}
.col-card.good .col-head{color:var(--orange-dark);}
.col-card ul{list-style:none; display:flex; flex-direction:column; gap:11px;}
.col-card ul li{font-size:14px; color:var(--mist); padding-left:16px; position:relative; line-height:1.5;}
.col-card ul li::before{content:''; position:absolute; left:0; top:7px; width:6px;height:6px;border-radius:50%;background:currentColor; opacity:.6;}

/* feature grid */
.fgrid{display:grid; grid-template-columns:repeat(var(--cols,3), 1fr); gap:16px; max-width:1100px;}
.fcard{background:rgba(15,29,58,0.04); border:1px solid var(--line); border-radius:16px; padding:22px; transition:transform .25s ease, border-color .2s, box-shadow .25s ease; transform-style:preserve-3d;}
.fcard:hover{transform:perspective(800px) rotateX(6deg) translateY(-5px); border-color:var(--orange); box-shadow:0 16px 30px -18px rgba(15,29,58,0.35);}
.fcard .ico-box{width:44px;height:44px;border-radius:11px; background:rgba(232,114,12,0.15); border:1px solid rgba(232,114,12,0.35); display:flex;align-items:center;justify-content:center; color:var(--orange-dark); margin-bottom:16px;}
.fcard h3{font-family:var(--font-display); font-size:16px; font-weight:700; margin-bottom:8px;}
.fcard p{font-size:13.5px; color:var(--mist); line-height:1.55;}
.fcard .tag{display:inline-block; margin-top:12px; font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.06em; color:var(--gold); border:1px solid rgba(185,138,0,0.35); padding:3px 9px; border-radius:12px;}

/* persona */
.persona-wrap{display:flex; gap:44px; align-items:center; max-width:1100px;}
.persona-card{width:280px; flex-shrink:0; background:rgba(15,29,58,0.05); border:1px solid var(--line); border-radius:20px; padding:28px; text-align:center;}
.persona-avatar{width:84px;height:84px;border-radius:50%; margin:0 auto 16px; background:linear-gradient(135deg,var(--orange),var(--orange-dark)); display:flex;align-items:center;justify-content:center; font-family:var(--font-display); font-size:30px; font-weight:800; color:#fff;}
.persona-name{font-family:var(--font-display); font-size:22px; font-weight:700;}
.persona-sub{font-size:12.5px; color:var(--orange-dark); font-family:var(--font-mono); margin:4px 0 18px;}
.persona-stats{display:flex; flex-direction:column; gap:9px; text-align:left; font-size:12.5px; color:var(--mist); border-top:1px solid var(--line); padding-top:16px;}
.persona-stats b{color:var(--ink); font-weight:600;}
.persona-chips{flex:1;}
.persona-chips h4{font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--red); margin-bottom:14px;}
.chip-row{display:flex; flex-wrap:wrap; gap:9px;}
.chip{font-size:13px; padding:9px 14px; border-radius:20px; background:rgba(230,57,70,0.08); border:1px solid rgba(230,57,70,0.3); color:var(--mist);}
.note-box{display:flex; gap:10px; align-items:flex-start; font-size:11.5px; color:var(--mist); background:rgba(15,29,58,0.04); border:1px solid var(--line); border-radius:10px; padding:10px 14px; margin-top:18px; max-width:1100px;}

/* journey */
.journey{position:relative; max-width:1100px; padding-top:20px;}
.journey-line{position:relative; height:2px; background:var(--line); margin:0 20px 40px; border-radius:2px; overflow:visible;}
.journey-line .fill{position:absolute; top:0; left:0; height:100%; width:0%; background:linear-gradient(90deg,var(--orange-bright),var(--gold-bright)); border-radius:2px;}
.journey-steps{display:grid; grid-template-columns:repeat(5,1fr); gap:14px;}
.journey-steps.n4{grid-template-columns:repeat(4,1fr);}
.jstep{text-align:left; position:relative;}
.jstep .num{width:34px;height:34px;border-radius:50%; background:var(--bg); border:2px solid var(--orange); color:var(--orange-dark); display:flex;align-items:center;justify-content:center; font-family:var(--font-mono); font-weight:600; font-size:13px; margin-bottom:12px;}
.jstep h4{font-size:13.5px; font-weight:600; margin-bottom:6px;}
.jstep p{font-size:12px; color:var(--mist); line-height:1.5;}

/* stakeholder list */
.sh-groups{display:flex; gap:40px; max-width:1100px;}
.sh-col{flex:1;}
.sh-col h3{font-family:var(--font-display); font-size:16px; margin-bottom:16px; display:flex; align-items:center; gap:8px;}
.sh-col.primary h3{color:var(--orange-dark);}
.sh-col.secondary h3{color:var(--gold);}
.sh-chip{display:flex; align-items:center; gap:12px; padding:13px 16px; background:rgba(15,29,58,0.04); border:1px solid var(--line); border-radius:12px; margin-bottom:10px; font-size:13.5px;}
.sh-chip .ico-box{width:30px;height:30px;border-radius:8px; display:flex;align-items:center;justify-content:center; flex-shrink:0;}
.sh-col.primary .ico-box{background:rgba(232,114,12,.15); color:var(--orange-dark);}
.sh-col.secondary .ico-box{background:rgba(185,138,0,.15); color:var(--gold);}

/* table */
table.dtable{width:100%; max-width:1130px; border-collapse:collapse; font-size:13px;}
table.dtable th{font-family:var(--font-mono); text-transform:uppercase; letter-spacing:0.06em; font-size:10.5px; color:var(--orange-dark); text-align:left; padding:10px 14px; border-bottom:2px solid rgba(232,114,12,.4);}
table.dtable td{padding:12px 14px; border-bottom:1px solid var(--line); color:var(--mist); vertical-align:top; line-height:1.45;}
table.dtable tr td:first-child{color:var(--ink); font-weight:600;}
.pill{display:inline-block; font-size:10.5px; font-family:var(--font-mono); padding:3px 9px; border-radius:10px; letter-spacing:.04em;}
.pill.high{background:rgba(230,57,70,.18); color:#ff8a93; border:1px solid rgba(230,57,70,.4);}
.pill.med{background:rgba(185,138,0,.18); color:var(--gold); border:1px solid rgba(185,138,0,.4);}
.pill.low{background:rgba(232,114,12,.18); color:var(--orange-bright); border:1px solid rgba(232,114,12,.4);}
.pill.reduce{background:rgba(232,114,12,.18); color:var(--orange-bright); border:1px solid rgba(232,114,12,.4);}
.pill.accept{background:rgba(42,120,214,.18); color:#6fa8ea; border:1px solid rgba(42,120,214,.4);}
.pill.transfer{background:rgba(15,29,58,.5); color:#c9d2e6; border:1px solid rgba(15,29,58,.7);}

/* phases */
.phase-row{display:grid; grid-template-columns:1fr 1fr; gap:22px; max-width:1100px;}
.phase-row.n1{grid-template-columns:1fr;}
.phase-card{background:rgba(15,29,58,0.04); border:1px solid var(--line); border-radius:16px; padding:24px; position:relative; overflow:hidden; border-top:3px solid var(--orange);}
.phase-card.c-blue{border-top-color:#2a78d6;}
.phase-card.c-green{border-top-color:#1baf7a;}
.phase-card.c-purple{border-top-color:#8a6fe0;}
.phase-card.c-navy{border-top-color:var(--navy);}
.phase-card::before{content:attr(data-n); position:absolute; top:-14px; right:8px; font-family:var(--font-display); font-size:78px; font-weight:800; color:rgba(15,29,58,0.04);}
.phase-card h3{font-family:var(--font-display); font-size:17px; margin-bottom:6px; color:var(--orange-dark);}
.phase-card .sub{font-family:var(--font-mono); font-size:11px; color:var(--gold); margin-bottom:14px; letter-spacing:.05em;}
.phase-card ul{list-style:none; display:flex; flex-direction:column; gap:8px;}
.phase-card ul li{font-size:13px; color:var(--mist); padding-left:14px; position:relative;}
.phase-card ul li::before{content:'→'; position:absolute; left:0; color:var(--orange);}
.phase-card .mvp{display:inline-flex; align-items:center; gap:6px; margin-top:10px; font-family:var(--font-mono); font-size:11px; background:rgba(232,114,12,.12); color:var(--orange-dark); border:1px solid rgba(232,114,12,.3); padding:5px 10px; border-radius:10px;}

/* success list */
.slist{display:flex; flex-direction:column; gap:14px; max-width:760px;}
.sitem{display:flex; gap:14px; align-items:flex-start; padding:14px 16px; background:rgba(232,114,12,0.05); border:1px solid rgba(232,114,12,0.2); border-radius:12px;}
.sitem .check{width:26px;height:26px;border-radius:50%; background:var(--orange); color:#fff; display:flex;align-items:center;justify-content:center; flex-shrink:0; font-weight:700; font-size:13px;}
.sitem b{display:block; font-size:14.5px; margin-bottom:2px;}
.sitem span{font-size:13px; color:var(--mist);}
.sitem .metric{font-family:var(--font-mono); font-size:11.5px; color:var(--orange-dark); margin-left:auto; white-space:nowrap; padding-left:12px;}

/* conclusion */
.conc-wrap{max-width:1130px;}
.conc-quote{font-family:var(--font-display); font-size:32px; line-height:1.28; font-weight:700; margin-bottom:22px;}
.conc-quote .hl{color:var(--orange);}
.conc-sub{font-size:15px; color:var(--mist); line-height:1.6; max-width:680px; margin-bottom:8px;}
.conc-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; max-width:1130px; margin:22px 0 24px;}
.conc-card{border-radius:14px; padding:18px; color:#fff;}
.conc-card h4{font-family:var(--font-display); font-size:14.5px; margin-bottom:6px;}
.conc-card p{font-size:12px; opacity:.85; line-height:1.5; margin-bottom:10px;}
.conc-card .stamp{font-family:var(--font-mono); font-size:10.5px; opacity:.8; display:flex; align-items:center; gap:6px;}
.conc-tagline{margin-top:10px; font-family:var(--font-mono); font-size:13px; color:var(--orange-dark); letter-spacing:.04em;}

/* ===== phone mockups ===== */
.mockup-row{display:flex; gap:22px; align-items:flex-start; flex-wrap:wrap;}
.phone{width:230px; flex-shrink:0; border-radius:32px; background:var(--navy); padding:10px; box-shadow:0 24px 50px -20px rgba(15,29,58,0.5);}
.phone .screen{background:#fff; border-radius:24px; overflow:hidden; min-height:420px; display:flex; flex-direction:column;}
.phone .statusbar{height:26px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; font-family:var(--font-mono); font-size:9px; color:var(--mist);}
.phone .pbar{background:var(--navy); color:#fff; padding:10px 14px; font-family:var(--font-display); font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:space-between;}
.phone .pbody{padding:12px; flex:1; display:flex; flex-direction:column; gap:10px;}
.phone .alertcard{border:1px solid var(--line); border-radius:14px; padding:14px; text-align:center;}
.phone .alertcard .tri{width:34px;height:34px;margin:0 auto 8px; color:var(--red-bright);}
.phone .alertcard h5{font-family:var(--font-display); font-size:13.5px; margin-bottom:4px;}
.phone .alertcard p{font-size:10px; color:var(--mist); line-height:1.4; margin-bottom:8px;}
.phone .statrow{display:flex; justify-content:space-around; border-top:1px solid var(--line); padding-top:8px; margin-top:4px;}
.phone .statrow div{text-align:center;}
.phone .statrow b{display:block; font-size:13px; font-family:var(--font-mono);}
.phone .statrow span{font-size:8px; color:var(--mist); text-transform:uppercase; letter-spacing:.04em;}
.phone .btnrow{display:flex; gap:8px;}
.phone .btnrow button{flex:1; padding:8px; border-radius:10px; font-size:10.5px; font-weight:600; border:none;}
.phone .btnrow .cancel{background:rgba(230,57,70,.12); color:var(--red);}
.phone .btnrow .view{background:rgba(42,120,214,.12); color:#2a78d6;}
.phone .miniactive{font-size:9px; color:var(--mist); text-transform:uppercase; letter-spacing:.05em; display:flex; justify-content:space-between; margin-top:2px;}
.phone .activerow{display:flex; align-items:center; gap:8px; padding:8px; background:rgba(15,29,58,0.03); border-radius:10px; font-size:10px;}
.phone .activerow .dot{width:20px;height:20px;border-radius:50%;background:rgba(230,57,70,.15); color:var(--red); display:flex;align-items:center;justify-content:center; flex-shrink:0;}
.phone .activerow .dot svg{width:11px;height:11px;}
.phone .navrow{margin-top:auto; display:flex; justify-content:space-around; border-top:1px solid var(--line); padding:8px 0 2px; }
.phone .navrow div{display:flex; flex-direction:column; align-items:center; gap:2px; font-size:7.5px; color:var(--mist);}
.phone .navrow svg{width:15px;height:15px;}
.phone .navrow .on{color:var(--orange-dark);}
.phone .mapzone{position:relative; background:var(--navy); border-radius:12px; flex:1; min-height:170px; overflow:hidden;}
.phone .mapzone svg{width:100%; height:100%;}
.phone .shelterbadge{position:absolute; top:8px; left:8px; right:8px; background:#fff; border-radius:10px; padding:8px 10px; display:flex; align-items:center; gap:8px; box-shadow:0 6px 14px rgba(0,0,0,.15);}
.phone .shelterbadge .go{width:24px;height:24px;border-radius:8px;background:rgba(232,114,12,.15); color:var(--orange-dark); display:flex;align-items:center;justify-content:center; flex-shrink:0;}
.phone .shelterbadge .go svg{width:13px;height:13px;}
.phone .shelterbadge b{font-size:12px; display:block;}
.phone .shelterbadge span{font-size:8.5px; color:var(--mist);}
.phone .turnbar{background:var(--navy); color:#fff; border-radius:12px; padding:10px 12px; display:flex; align-items:center; gap:10px;}
.phone .turnbar svg{width:18px;height:18px; flex-shrink:0;}
.phone .turnbar b{font-size:11.5px; display:block;}
.phone .turnbar span{font-size:9px; opacity:.7;}
.phone .arrivalrow{display:flex; align-items:center; justify-content:space-between; font-size:10px; color:var(--mist);}
.phone .arrivalrow button{background:var(--orange); color:#fff; border:none; padding:6px 14px; border-radius:10px; font-size:10.5px; font-weight:700;}
.mockup-caption{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--orange-dark); text-align:center; margin-top:10px;}
.mockup-sub{font-size:11.5px; color:var(--mist); text-align:center; margin-top:2px; max-width:230px;}
.mockup-col{display:flex; flex-direction:column; align-items:center;}
.platform-feats{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; flex:1; min-width:280px; align-content:start;}
.platform-feats .pf{background:rgba(15,29,58,0.04); border:1px solid var(--line); border-radius:12px; padding:14px;}
.platform-feats .pf .ico-box{width:32px;height:32px;border-radius:9px;background:rgba(232,114,12,.14); border:1px solid rgba(232,114,12,.32); color:var(--orange-dark); display:flex;align-items:center;justify-content:center; margin-bottom:8px;}
.platform-feats .pf h4{font-family:var(--font-display); font-size:13.5px; margin-bottom:4px;}
.platform-feats .pf p{font-size:11.5px; color:var(--mist); line-height:1.45;}

/* ===== risk heat matrix ===== */
.riskmatrix-wrap{display:flex; gap:34px; max-width:1130px; align-items:flex-start; flex-wrap:wrap;}
.rm-chart{display:flex; gap:8px; flex-shrink:0;}
.rm-ylab{display:flex; flex-direction:column-reverse; justify-content:space-between; font-size:10px; color:var(--mist); font-family:var(--font-mono); text-align:right; padding:2px 0; height:280px;}
.rm-grid{display:grid; grid-template-columns:repeat(5,52px); grid-template-rows:repeat(5,52px); gap:3px; position:relative;}
.rm-cell{border-radius:6px;}
.rm-badge{
  width:30px;height:30px;border-radius:50%; background:var(--navy); color:#fff; display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-weight:700; font-size:11px; z-index:2; align-self:center; justify-self:center; box-shadow:0 4px 10px rgba(0,0,0,.25);
}
.rm-xlabs{display:grid; grid-template-columns:repeat(5,52px); gap:3px; margin-top:6px; font-size:9.5px; color:var(--mist); font-family:var(--font-mono); text-align:center;}
.rm-axistitle{font-family:var(--font-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--mist); text-align:center; margin-top:4px;}
.rm-ytitle{writing-mode:vertical-rl; transform:rotate(180deg); font-family:var(--font-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--mist); text-align:center;}
.rm-list{flex:1; min-width:340px; display:flex; flex-direction:column; gap:9px;}
.rm-row{display:flex; align-items:center; gap:12px; padding:11px 14px; background:rgba(15,29,58,0.03); border:1px solid var(--line); border-radius:12px;}
.rm-row .idc{width:28px;height:28px;border-radius:50%; background:var(--navy); color:#fff; display:flex;align-items:center;justify-content:center; font-family:var(--font-mono); font-weight:700; font-size:11px; flex-shrink:0;}
.rm-row .icobox{width:30px;height:30px;border-radius:9px; background:rgba(232,114,12,.13); color:var(--orange-dark); display:flex;align-items:center;justify-content:center; flex-shrink:0;}
.rm-row .icobox svg{width:16px;height:16px;}
.rm-row .txt{flex:1; min-width:0;}
.rm-row .txt b{font-size:13px; display:block;}
.rm-row .txt span{font-size:11px; color:var(--mist);}
.rm-row .score{font-family:var(--font-mono); font-size:16px; font-weight:700; text-align:center; width:34px; flex-shrink:0;}
.rm-row .implabel{font-size:10.5px; font-weight:600; width:82px; flex-shrink:0; text-align:right;}

/* ===== fishbone ===== */
.fishbone-wrap{position:relative; width:100%; max-width:1130px; margin:0 auto;}
.fishbone-svg{width:100%; height:auto; display:block;}
.fb-cat{position:absolute; width:230px;}
.fb-cat .lbl{display:inline-flex; align-items:center; gap:6px; font-family:var(--font-mono); font-weight:700; font-size:11px; letter-spacing:.05em; text-transform:uppercase; padding:4px 10px; border-radius:8px; color:#fff; margin-bottom:6px;}
.fb-cat ul{list-style:none; font-size:10.5px; color:var(--mist); line-height:1.5;}
.fb-cat ul li{margin-bottom:2px;}
.fb-legend{display:flex; gap:18px; flex-wrap:wrap; margin-top:14px; font-size:11px; color:var(--mist);}
.fb-legend b{color:var(--ink); font-family:var(--font-display); font-size:12px;}

/* ===== budget pie ===== */
.pie-wrap{display:flex; gap:50px; align-items:center; max-width:1130px; flex-wrap:wrap;}
.pie{width:230px; height:230px; border-radius:50%; flex-shrink:0; position:relative;}
.pie::after{content:''; position:absolute; inset:34px; border-radius:50%; background:var(--bg);}
.pie-legend{display:flex; flex-direction:column; gap:12px; flex:1; min-width:280px;}
.pie-row{display:flex; align-items:center; gap:12px;}
.pie-row .sw{width:14px;height:14px;border-radius:4px; flex-shrink:0;}
.pie-row .lbl{flex:1; font-size:13.5px; font-weight:600;}
.pie-row .pct{font-family:var(--font-mono); font-size:15px; font-weight:700; width:44px; text-align:right;}
.pie-row .desc{font-size:11.5px; color:var(--mist); display:block; font-weight:400;}

@media (max-width:900px){
  .slide{padding:90px 24px 70px;}
  .cover-title{font-size:44px;}
  .team-grid{grid-template-columns:repeat(2,1fr);}
  .fgrid{grid-template-columns:repeat(2,1fr) !important;}
  .twocol,.phase-row,.pie-wrap,.sh-groups,.riskmatrix-wrap,.conc-grid{grid-template-columns:1fr; flex-direction:column;}
  .journey-steps{grid-template-columns:repeat(2,1fr);}
  .journey-steps.n4{grid-template-columns:repeat(2,1fr);}
  .mockup-row{justify-content:center;}
}

/* ===== boot loader ===== */
#bootLoader{
  position:fixed; inset:0; z-index:500; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;
  transition:opacity .6s ease, visibility 0s linear 0s;
}
#bootLoader.done{opacity:0; visibility:hidden; transition:opacity .6s ease, visibility 0s linear .6s;}
.bootMark{font-family:var(--font-display); font-weight:800; font-size:24px; letter-spacing:0.01em;
  opacity:0; animation:bootFadeUp .6s ease forwards .1s;}
.bootMark .l{color:var(--orange);}
.bootTrack{width:220px; height:2px; background:var(--line); border-radius:2px; position:relative; overflow:hidden;
  opacity:0; animation:bootFadeUp .6s ease forwards .3s;}
.bootDot{position:absolute; top:50%; left:0; width:10px; height:10px; border-radius:50%; background:var(--orange-bright);
  transform:translate(-50%,-50%); box-shadow:0 0 10px rgba(232,114,12,.6); animation:bootTravel 1.3s cubic-bezier(.45,0,.55,1) infinite;}
@keyframes bootTravel{ 0%{left:0%;} 100%{left:100%;} }
.bootLabel{font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--mist);
  opacity:0; animation:bootFadeUp .6s ease forwards .45s, bootBlink 1.4s ease-in-out infinite .45s;}
@keyframes bootFadeUp{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
@keyframes bootBlink{ 0%,100%{opacity:0.5;} 50%{opacity:1;} }

/* ===== custom cursor (fine-pointer devices only) ===== */
html.fine-pointer, html.fine-pointer *{cursor:none !important;}
#cursorDot,#cursorRing{position:fixed; top:0; left:0; pointer-events:none; z-index:400; border-radius:50%; display:none;}
html.fine-pointer #cursorDot,html.fine-pointer #cursorRing{display:block;}
#cursorDot{width:6px; height:6px; background:var(--orange-bright); transform:translate(-50%,-50%);}
#cursorRing{width:30px; height:30px; border:1.5px solid var(--orange); opacity:0.55;
  transform:translate(-50%,-50%); transition:transform .15s ease-out, width .2s ease, height .2s ease, opacity .2s ease, border-color .2s ease;}
#cursorRing.hover{width:46px; height:46px; opacity:0.9; border-color:var(--gold); background:rgba(185,138,0,0.06);}

</style>
</head>

// ---- risk heat matrix ----
function renderRiskMatrix(d){
  const cellColor=(x,y)=>{ // x=likelihood 1-5, y=impact 1-5
    const s = x + y; // 2..10
    const t = (s-2)/8;
    const stops = ['#cfe3f5','#ffe9b0','#ffcf7a','#ff9a5c','#e8590c'];
    const idx = Math.min(3, Math.floor(t*4));
    const mix = (t*4) - idx;
    return `color-mix(in srgb, ${stops[idx]} ${100-mix*100}%, ${stops[idx+1]} ${mix*100}%)`;
  };
  let cells = '';
  for(let impact=5; impact>=1; impact--){
    for(let lk=1; lk<=5; lk++){
      const risk = d.risks.find(r=>r.likelihood===lk && r.impactY===impact);
      cells += `<div class="rm-cell" style="grid-column:${lk}; grid-row:${6-impact}; background:${cellColor(lk,impact)}"></div>`;
      if(risk){
        cells += `<div class="rm-badge" style="grid-column:${lk}; grid-row:${6-impact};">${risk.id}</div>`;
      }
    }
  }
  return `<div class="eyebrow reveal">${d.eyebrow}</div>
  <h1 class="title reveal">${d.title}</h1>
  <div class="riskmatrix-wrap reveal">
    <div>
      <div style="font-family:var(--font-display); font-weight:700; font-size:15px; margin-bottom:10px;">Risk Heat Matrix</div>
      <div class="rm-chart">
        <div class="rm-ytitle">Impact</div>
        <div class="rm-ylab"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
        <div>
          <div class="rm-grid">${cells}</div>
          <div class="rm-xlabs"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
          <div class="rm-axistitle">Likelihood</div>
        </div>
      </div>
    </div>
    <div class="rm-list">
      ${d.risks.map(r=>`<div class="rm-row"><span class="idc">${r.id}</span><span class="icobox">${ICON(r.icon)}</span><span class="txt"><b>${r.h}</b><span>${r.d}</span></span><span class="score" style="color:${r.score>=15?'var(--red-bright)':r.score>=11?'var(--gold)':'var(--orange)'}">${r.score}</span><span class="implabel" style="color:${r.score>=15?'var(--red-bright)':r.score>=11?'var(--gold)':'var(--orange)'}">${r.impact}</span></div>`).join('')}
    </div>
  </div>`;
}

let current = 0;
const slideEls = document.querySelectorAll('.slide');
const dotEls = document.querySelectorAll('.dotnav');

function goTo(i){
  if(i<0 || i>=SLIDES.length) return;
  slideEls[current].classList.remove('active');
  current = i;
  const s = SLIDES[current];
  slideEls[current].classList.add('active');
  dotEls.forEach((d,idx)=>d.classList.toggle('active', idx===current));
  document.getElementById('counter').textContent = String(current+1).padStart(2,'0')+' / '+SLIDES.length;
  document.getElementById('speakerName').textContent = s.speaker;
  document.getElementById('speakerTime').textContent = s.time;
  document.getElementById('routefill').style.width = (100*(current+1)/SLIDES.length)+'%';

  setTimeout(()=>{
    slideEls[current].querySelectorAll('.bar-fill').forEach(b=>{ b.style.width = b.dataset.pct+'%'; });
    const jf = slideEls[current].querySelector('#jfill');
    if(jf){ jf.style.transition='width 1.4s cubic-bezier(.2,.8,.2,1)'; jf.style.width='100%'; }
  }, 150);
}

// ===================== CUSTOM CURSOR (fine-pointer only) =====================
const isFinePointer = window.matchMedia && window.matchMedia('(pointer: fine)').matches;
if(isFinePointer){
  document.documentElement.classList.add('fine-pointer');
  const cDot = document.getElementById('cursorDot');
  const cRing = document.getElementById('cursorRing');
  window.addEventListener('mousemove', (e)=>{
    cDot.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%,-50%)`;
    cRing.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%,-50%)`;
  });
  const hoverSelector = 'button, .navbtn, .dotnav, a, .fcard, .team-card, .col-card, .phase-card, .chip, .sh-chip, input, select';
  document.addEventListener('mouseover', (e)=>{
    if(e.target.closest(hoverSelector)) cRing.classList.add('hover');
  });
  document.addEventListener('mouseout', (e)=>{
    if(e.target.closest(hoverSelector)) cRing.classList.remove('hover');
  });
}

// ===================== COVER SLIDE 3D TILT =====================
const coverWrap = document.querySelector('.cover-wrap');
if(coverWrap){
  const coverSlide = coverWrap.closest('.slide');
  const badge = coverWrap.querySelector('.cover-badge');
  const title = coverWrap.querySelector('.cover-title');
  const tag = coverWrap.querySelector('.cover-tag');
  const meta = coverWrap.querySelector('.cover-meta');

  coverSlide.addEventListener('mousemove', (e)=>{
    const r = coverSlide.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width - 0.5;
    const py = (e.clientY - r.top) / r.height - 0.5;
    if(title) title.style.transform = `rotateY(${px*10}deg) rotateX(${-py*8}deg) translateZ(0)`;
    if(badge) badge.style.transform = `translate(${px*10}px, ${py*8}px)`;
    if(tag) tag.style.transform = `translate(${px*14}px, ${py*10}px)`;
    if(meta) meta.style.transform = `translate(${px*6}px, ${py*5}px)`;
  });
  coverSlide.addEventListener('mouseleave', ()=>{
    if(title) title.style.transform = '';
    if(badge) badge.style.transform = '';
    if(tag) tag.style.transform = '';
    if(meta) meta.style.transform = '';
  });
}


document.getElementById('nextBtn').addEventListener('click',()=>goTo(current+1));
document.getElementById('prevBtn').addEventListener('click',()=>goTo(current-1));

function handleKey(e){
  if(['ArrowRight','ArrowDown',' ','PageDown'].includes(e.key)){ e.preventDefault(); goTo(current+1); }
  if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){ e.preventDefault(); goTo(current-1); }
}
document.addEventListener('keydown', handleKey);
document.body.setAttribute('tabindex','-1');
window.addEventListener('load', ()=> document.body.focus());
document.body.addEventListener('click', ()=> document.body.focus());

let touchX=null;
window.addEventListener('touchstart',e=>touchX=e.touches[0].clientX);
window.addEventListener('touchend',e=>{
  if(touchX===null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if(dx<-40) goTo(current+1);
  if(dx>40) goTo(current-1);
  touchX=null;
});
</script>
</body>
</html>
